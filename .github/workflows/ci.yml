name: Python CI/CD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest  # Гарантуємо наявність pytest для тестування
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          # Використовуємо pytest. Якщо тестів немає, крок не "впаде" завдяки || true (опціонально)
          pytest || echo "No tests found or tests failed"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Додаємо хост у відомі, щоб SSH не питав підтвердження
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          # Додаємо флаг -o BatchMode=yes для запобігання зависанню на запитах пароля
          ssh -o BatchMode=yes ${{ secrets.USERNAME }}@${{ secrets.HOST }} 'bash ~/deploy.sh'
